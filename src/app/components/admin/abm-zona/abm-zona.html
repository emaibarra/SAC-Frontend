<<div style="padding: 20px; font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto;">
  
  <button routerLink="/admin" style="margin-bottom: 20px; padding: 10px 20px; background: var(--color-gris, #6c757d); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;">
    ⬅ Volver al Dashboard
  </button>

  <div style="background: var(--color-fondo-panel, #ffffff); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(42, 43, 83, 0.08);">
    
    <h3 style="color: var(--color-azul-oscuro, #1a237e); margin-top: 0; border-bottom: 2px solid var(--color-naranja-claro, #ff9800); padding-bottom: 10px;">
      📍 Gestión de Zonas
    </h3>
    
    <form (ngSubmit)="guardarZona()" style="margin: 25px 0; display: flex; flex-direction: column; gap: 15px;">
       
       <div style="display: flex; gap: 15px; flex-wrap: wrap;">
         <input type="text" name="nombre" [(ngModel)]="nuevaZona.zonaNombre" placeholder="Nombre de la Zona (Ej. Gran Mendoza)" required style="flex: 1; min-width: 200px; padding: 12px; border: 1px solid var(--color-gris, #ccc); border-radius: 6px; outline: none;">
         
         <!-- Select dinámico de Provincias -->
         <select name="provincia" [(ngModel)]="nuevaZona.provincia.provinciaId" required style="flex: 1; min-width: 200px; padding: 12px; border: 1px solid var(--color-gris, #ccc); border-radius: 6px; outline: none; background: white;">
           <option [ngValue]="null" disabled selected>Seleccione una Provincia...</option>
           <option *ngFor="let prov of provincias" [ngValue]="prov.provinciaId">
             {{ prov.provinciaNombre }}
           </option>
         </select>
       </div>

       <textarea name="descripcion" [(ngModel)]="nuevaZona.zonaDescripcion" placeholder="Descripción breve de la zona (Opcional)" rows="2" style="width: 100%; padding: 12px; border: 1px solid var(--color-gris, #ccc); border-radius: 6px; outline: none; resize: vertical;"></textarea>

       <button type="submit" [disabled]="!nuevaZona.zonaNombre || !nuevaZona.provincia.provinciaId" style="padding: 12px 25px; background: var(--color-naranja-claro, #ff9800); color: white; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; align-self: flex-start;">
         Guardar Zona
       </button>
    </form>

    <h4 style="color: var(--color-azul-medio, #1976d2); margin-top: 30px;">Zonas Registradas</h4>
    
    <p *ngIf="zonas.length === 0" style="color: var(--color-gris, #6c757d); font-style: italic; text-align: center; padding: 20px;">
      No hay zonas cargadas...
    </p>

    <ul *ngIf="zonas.length > 0" style="list-style-type: none; padding: 0; margin: 0;">
      <li *ngFor="let zona of zonas" style="background: var(--color-fondo-pantalla, #f4f6f9); padding: 15px; border-left: 5px solid var(--color-naranja-claro, #ff9800); margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
        
        <div>
          <strong style="color: var(--color-azul-oscuro, #1a237e); font-size: 16px; display: block;">{{ zona.zonaNombre }}</strong> 
          <span style="font-size: 13px; color: #555;">
            🗺️ Provincia: {{ zona.provincia?.provinciaNombre }}
            <br>
            <span *ngIf="zona.zonaDescripcion" style="color: #888; font-style: italic;">📝 {{ zona.zonaDescripcion }}</span>
          </span>
        </div>
        
        <button (click)="eliminarZona(zona.zonaId)" style="background: var(--color-naranja-teja, #e65100); color: white; border: none; border-radius: 4px; padding: 8px 12px; cursor: pointer; font-size: 12px; height: fit-content;">
          Eliminar
        </button>
        
      </li>
    </ul>
    
  </div>
</div>
