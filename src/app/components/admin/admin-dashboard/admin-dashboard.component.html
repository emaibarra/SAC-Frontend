<div style="padding: 20px; font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto;">
  
  <!-- Encabezado Principal con Botón de Cerrar Sesión -->
  <div style="display: flex; justify-content: space-between; align-items: center; background: var(--color-fondo-panel, #ffffff); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(42, 43, 83, 0.08); margin-bottom: 30px; border-left: 5px solid var(--color-azul-oscuro, #1a237e);">
    
    <div>
      <h2 style="color: var(--color-azul-oscuro, #1a237e); margin: 0;">🛠️ Panel de Control</h2>
      <p style="color: var(--color-gris, #6c757d); margin: 5px 0 0 0; font-size: 14px;">Bienvenido, Administrador.</p>
    </div>

    <!-- Botón Cerrar Sesión Global -->
    <button (click)="cerrarSesion()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
      🚪 Cerrar Sesión
    </button>
  </div>

  <!-- Grilla de Módulos (Accesos Directos) -->
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
    
    <!-- Tarjeta: Gestión de Empresas -->
    <div style="background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--color-naranja-claro, #ff9800);">
      <h3 style="color: var(--color-azul-oscuro, #1a237e);">🏢 Empresas</h3>
      <p style="color: var(--color-gris, #6c757d); font-size: 14px;">Alta, baja y modificación de empresas prestadoras.</p>
      <button routerLink="/admin/empresas" style="margin-top: 15px; width: 100%; padding: 12px; background: var(--color-naranja-claro, #ff9800); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
        Ir a Empresas
      </button>
    </div>

    <!-- Tarjeta: Gestión de Provincias -->
    <div style="background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--color-azul-medio, #1976d2);">
      <h3 style="color: var(--color-azul-oscuro, #1a237e);">🗺️ Provincias</h3>
      <p style="color: var(--color-gris, #6c757d); font-size: 14px;">Gestión de territorios y zonas operativas.</p>
      <button routerLink="/admin/provincias" style="margin-top: 15px; width: 100%; padding: 12px; background: var(--color-azul-medio, #1976d2); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
        Ir a Provincias
      </button>
    </div>

    <!-- Próximo módulo a desarrollar -->
   <div style="background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--color-azul-medio, #1976d2);">
      <h3 style="color: var(--color-azul-oscuro, #1a237e);">🗺️ Zonas</h3>
      <p style="color: var(--color-gris, #6c757d); font-size: 14px;">Definición y gestión de zonas operativas.</p>
      <button routerLink="/admin/zonas" style="margin-top: 15px; width: 100%; padding: 12px; background: var(--color-azul-medio, #1976d2); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
        Ir a Zonas
      </button>
    </div>
  </div>
</div>
