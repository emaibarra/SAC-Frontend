<div style="padding: 40px 20px; font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; text-align: center;">
  
  <!-- Encabezado con título SAC y botón de cerrar sesión discreto -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <div style="width: 80px;"></div> <!-- Espaciador para centrar el título -->
    
    <h1 style="color: #f08a4b; font-style: italic; font-weight: bold; margin: 0; font-size: 32px; letter-spacing: 2px;">
      SAC
    </h1>
    
    <button (click)="cerrarSesion()" style="background: transparent; color: #dc3545; border: 1px solid #dc3545; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: bold;">
      Salir
    </button>
  </div>

  <!-- Contenedor de Botones (Estilo Flexbox vertical) -->
  <div style="display: flex; flex-direction: column; gap: 15px;">
    
    <button routerLink="/gerente/tecnicos" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Administrar Técnicos
    </button>
    
    <button routerLink="/gerente/zonas" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Agregar zona de trabajo
    </button>
    
    <button routerLink="/gerente/problemas" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Administrar Problemas
    </button>
    
    <button routerLink="/gerente/lista-precios" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Administrar Lista de precios
    </button>
    
    <button (click)="generarReporte('Zona')" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Generar Reporte por Zona
    </button>
    
    <button (click)="generarReporte('Problema')" style="background-color: #2b4b80; color: white; border: none; border-radius: 6px; padding: 18px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
      Generar Reporte por Problema
    </button>

  </div>
</div>
