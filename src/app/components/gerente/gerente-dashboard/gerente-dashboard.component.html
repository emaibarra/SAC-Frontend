<div style="max-width: 500px; margin: 50px auto; background: var(--color-fondo-panel); padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(42, 43, 83, 0.1);">
  
  <h2 style="color: var(--color-azul-oscuro); margin-bottom: 5px;">¡Bienvenido de vuelta!</h2>
  
  <div style="font-size: 60px; margin: 10px 0;">🚴</div>
  <h3 style="color: var(--color-naranja-claro); font-style: italic; margin-bottom: 30px; letter-spacing: 2px;">SAC</h3>

  <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
    
    <button routerLink="/gerente/tecnicos" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Administrar Técnicos
    </button>
    
    <button routerLink="/gerente/zonas" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Agregar zona de trabajo
    </button>
    
    <button routerLink="/gerente/problemas" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Administrar Problemas
    </button>
    
    <button routerLink="/gerente/precios" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Administrar Lista de precios
    </button>

    <button routerLink="/gerente/reporte-zonas" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Generar Reporte por Zona
    </button>

    <button routerLink="/gerente/reporte-problemas" style="width: 80%; padding: 15px; background: var(--color-azul-medio); color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s;" onmouseover="this.style.backgroundColor='var(--color-azul-oscuro)'" onmouseout="this.style.backgroundColor='var(--color-azul-medio)'">
      Generar Reporte por Problema
    </button>

    <button (click)="cerrarSesion()" style="width: 80%; padding: 15px; background: #e74c3c; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px;" onmouseover="this.style.backgroundColor='#c0392b'" onmouseout="this.style.backgroundColor='#e74c3c'">
      Cerrar Sesión
    </button>

  </div>
</div>
